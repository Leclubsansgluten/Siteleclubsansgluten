name: SEO AutoPost — Le Club Sans Gluten
on:
  schedule:
    - cron: '0 7 * * *'   # 9h Paris — 4 articles en 1 seul run
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Générer 4 articles (1 par catégorie)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: python3 generate_articles.py

      - name: Commit et push
        run: |
          git config --global user.name 'Robot SEO — Le Club Sans Gluten'
          git config --global user.email 'bot@leclubsansgluten.com'
          git add .
          git commit -m "✨ 4 nouveaux articles — $(date +%Y-%m-%d)" || echo "Rien à commiter"
          git push
